<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ هدیه انگیزشی ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Vazirmatn",sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#667eea,#764ba2,#4facfe,#00f2fe);
background-size:400% 400%;
animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:90%;
max-width:700px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

text-align:center;

color:white;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

h1{

font-size:38px;
margin-bottom:15px;

}

.small{

opacity:.9;
margin-bottom:35px;

}

.quote{

font-size:26px;

line-height:2;

min-height:140px;

padding:10px;

transition:.5s;

}

button{

margin-top:30px;

padding:15px 35px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

background:white;

color:#6a11cb;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.08);

box-shadow:0 10px 25px rgba(255,255,255,.5);

}

.fade{

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

footer{

margin-top:30px;
opacity:.8;
font-size:14px;

}

.stars{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

z-index:-1;

}

.star{

position:absolute;

color:white;

font-size:20px;

animation:float linear infinite;

opacity:.7;

}

@keyframes float{

from{

transform:translateY(100vh) rotate(0deg);

}

to{

transform:translateY(-120px) rotate(360deg);

}

}

</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">

<h1>🌟 امروز بدرخش 🌟</h1>

<div class="small">
هیچ رویایی با تنبلی به واقعیت تبدیل نمی‌شود.
</div>

<div id="quote" class="quote">

شروع کن...
همین امروز بهترین روز زندگی تو می‌تواند باشد.

</div>

<button onclick="newQuote()">
✨ جمله جدید
</button>

<footer>
ساخته شده با ❤️
</footer>

</div>

<script>

const quotes=[

"هر موفقیتی از یک تصمیم برای شروع آغاز می‌شود. 🚀",

"امروز سخت تلاش کن تا فردا به خودت افتخار کنی. 💪",

"هیچ‌کس جز خودت مسئول آینده‌ات نیست. 🌱",

"شکست پایان نیست؛ شروع تجربه‌ای تازه است. ⭐",

"هر روز یک فرصت جدید برای ساختن زندگی بهتر است. ☀️",

"اگر رویایت بزرگ باشد، سختی مسیر کوچک می‌شود. ❤️",

"باور به خودت، اولین قدم موفقیت است. 🌸",

"تو قوی‌تر از چیزی هستی که فکر می‌کنی. 🔥",

"به جای بهانه، یک قدم بردار. 👣",

"آرام پیش برو؛ مهم این است که متوقف نشوی. 🌈",

"آینده متعلق به کسانی است که امروز تلاش می‌کنند. 🌟",

"به خودت ایمان داشته باش؛ معجزه از همین‌جا شروع می‌شود. ✨"

];

function newQuote(){

const q=document.getElementById("quote");

q.classList.remove("fade");

void q.offsetWidth;

q.innerHTML=quotes[Math.floor(Math.random()*quotes.length)];

q.classList.add("fade");

}

const stars=document.getElementById("stars");

for(let i=0;i<35;i++){

const s=document.createElement("div");

s.className="star";

s.innerHTML=["✨","⭐","💫","🌟"][Math.floor(Math.random()*4)];

s.style.left=Math.random()*100+"%";

s.style.animationDuration=(5+Math.random()*8)+"s";

s.style.fontSize=(16+Math.random()*20)+"px";

s.style.animationDelay=Math.random()*5+"s";

stars.appendChild(s);

}

</script>

</body>
</html>
